<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="favicon.png" />
  <title>Coduel | Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="themes.css">
  <style>
    :root {
      --bg-deep: #0d1017;
      --bg-top: #11151c;
      --bg-bottom: #1c2435;
      --panel: rgba(255, 255, 255, 0.03);
      --panel-hover: rgba(255, 255, 255, 0.055);
      --border: rgba(54, 65, 86, 0.55);
      --border-hover: var(--accent-border, rgba(125, 78, 87, 0.5));
      --accent: #7d4e57;
      --accent-2: #a06070;
      --accent-soft: rgba(125, 78, 87, 0.15);
      --accent-glow: rgba(125, 78, 87, 0.5);
      --text-main: #f0f2f8;
      --text-dim: #8892aa;
      --text-dimmer: #4e5870;
      --green: #3ddc84;
      --yellow: #fbbf24;
      --red: #f87171;
      --blue: #60a5fa;
      --radius-lg: 18px;
      --radius-md: 12px;
      --radius-sm: 8px;
      --transition: 0.22s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-font-smoothing: antialiased;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(ellipse 70% 40% at 50% 0%, var(--accent-body, rgba(125, 78, 87, 0.18)) 0%, transparent 60%),
        linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
      background-color: var(--bg-deep);
      color: var(--text-main);
      font-family: 'Inter', system-ui, sans-serif;
    }

    /* ─── Background grid ─── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(54, 65, 86, 0.13) 1px, transparent 1px),
        linear-gradient(90deg, rgba(54, 65, 86, 0.13) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse 80% 60% at 50% 0%, #000 20%, transparent 80%);
      z-index: 0;
    }

    /* ─── Nav ─── */
    .nav {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.9rem 1.75rem;
      background: rgba(13, 16, 23, 0.82);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      text-decoration: none;
      transition: opacity var(--transition);
    }

    .nav-brand:hover {
      opacity: 0.8;
    }

    .nav-logo {
      font-size: 1.15rem;
      font-weight: 900;
      letter-spacing: -0.04em;
      background: linear-gradient(130deg, #fff 20%, #c8a0b0 70%, #7d4e57 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .nav-tag {
      font-size: 0.65rem;
      font-weight: 600;
      color: var(--text-dimmer);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border: 1px solid var(--border);
      padding: 0.2rem 0.5rem;
      border-radius: 999px;
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .nav-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.45rem 1rem;
      border-radius: 999px;
      font-family: inherit;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: all var(--transition);
      letter-spacing: 0.01em;
    }

    .nav-btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
    }

    .nav-btn-ghost:hover {
      border-color: var(--accent-border, rgba(125, 78, 87, 0.4));
      color: var(--text-main);
      background: var(--accent-soft);
    }

    .nav-btn-accent {
      background: var(--accent-gradient, linear-gradient(135deg, #7d4e57, #a06070));
      border: 1px solid transparent;
      color: #fff;
      box-shadow: 0 4px 14px var(--accent-glow);
    }

    .nav-btn-accent:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 22px var(--accent-glow);
    }

    /* ─── Main content ─── */
    main {
      position: relative;
      z-index: 1;
      max-width: 1180px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
      animation: fadeInUp 0.5s ease both;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(22px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ─── Stat cards ─── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
    }

    .stat-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.35rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      position: relative;
      overflow: hidden;
      transition: all var(--transition);
      backdrop-filter: blur(8px);
    }

    .stat-card::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      background: radial-gradient(ellipse at 80% 20%, var(--card-glow, rgba(125, 78, 87, 0.15)) 0%, transparent 60%);
      transition: opacity var(--transition);
    }

    .stat-card:hover {
      border-color: var(--accent-border, rgba(125, 78, 87, 0.45));
      transform: translateY(-2px);
    }

    .stat-card:hover::before {
      opacity: 1;
    }

    .stat-card.total {
      --card-glow: var(--accent-body, rgba(125, 78, 87, 0.2));
    }

    .stat-card.done {
      --card-glow: rgba(61, 220, 132, 0.15);
    }

    .stat-card.wip {
      --card-glow: rgba(251, 191, 36, 0.15);
    }

    .stat-card.fresh {
      --card-glow: rgba(96, 165, 250, 0.12);
    }

    .stat-icon {
      font-size: 1.4rem;
      line-height: 1;
    }

    .stat-label {
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--text-dimmer);
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .stat-value {
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--text-main);
      line-height: 1;
      letter-spacing: -0.03em;
      font-variant-numeric: tabular-nums;
      transition: color 0.3s;
    }

    .stat-card.done .stat-value {
      color: var(--green);
    }

    .stat-card.wip .stat-value {
      color: var(--yellow);
    }

    .stat-card.fresh .stat-value {
      color: var(--blue);
    }

    /* ─── Toolbar ─── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .section-title {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text-main);
      flex: 0 0 auto;
      margin-right: 0.5rem;
    }

    .search-wrap {
      flex: 1;
      min-width: 180px;
      max-width: 320px;
      position: relative;
    }

    .search-icon {
      position: absolute;
      left: 0.8rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-dimmer);
      font-size: 0.9rem;
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--text-main);
      font-family: inherit;
      font-size: 0.82rem;
      padding: 0.5rem 1rem 0.5rem 2.2rem;
      outline: none;
      transition: all var(--transition);
    }

    .search-input::placeholder {
      color: var(--text-dimmer);
    }

    .search-input:focus {
      border-color: var(--accent);
      background: var(--accent-soft);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .filter-pills {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      margin-left: auto;
    }

    .filter-pill {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 0.4rem 0.9rem;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.04em;
      transition: all var(--transition);
    }

    .filter-pill:hover {
      border-color: var(--accent-border, rgba(125, 78, 87, 0.5));
      color: var(--text-main);
      background: var(--accent-soft);
    }

    .filter-pill.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      box-shadow: 0 4px 12px var(--accent-glow);
    }

    .filter-pill.active-fast {
      background: #1e3a2a;
      border-color: rgba(61, 220, 132, 0.5);
      color: var(--green);
    }

    .filter-pill.active-easy {
      background: #1e3a2a;
      border-color: rgba(61, 220, 132, 0.5);
      color: var(--green);
    }

    .filter-pill.active-medium {
      background: #3a2e10;
      border-color: rgba(251, 191, 36, 0.5);
      color: var(--yellow);
    }

    .filter-pill.active-hard {
      background: #3a1010;
      border-color: rgba(248, 113, 113, 0.5);
      color: var(--red);
    }

    /* ─── Problem grid ─── */
    .problems-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
    }

    /* Skeleton */
    .skeleton-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.4rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      overflow: hidden;
    }

    .sk-line {
      height: 12px;
      border-radius: 6px;
      background: linear-gradient(90deg, rgba(255, 255, 255, 0.04) 0%, rgba(255, 255, 255, 0.09) 50%, rgba(255, 255, 255, 0.04) 100%);
      background-size: 200% 100%;
      animation: shimmer 1.6s infinite;
    }

    .sk-line.short {
      width: 45%;
    }

    .sk-line.long {
      width: 80%;
    }

    .sk-line.thin {
      height: 8px;
      width: 60%;
    }

    @keyframes shimmer {
      0% {
        background-position: 200% 0;
      }

      100% {
        background-position: -200% 0;
      }
    }

    /* Problem card */
    .problem-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.25rem 1.4rem;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      transition: all var(--transition);
      position: relative;
      overflow: hidden;
      animation: fadeInUp 0.4s ease both;
    }

    .problem-card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 10%;
      bottom: 10%;
      width: 3px;
      border-radius: 0 3px 3px 0;
      background: var(--diff-color, var(--accent));
      opacity: 0;
      transition: opacity var(--transition), top var(--transition), bottom var(--transition);
    }

    .problem-card:hover {
      background: var(--panel-hover);
      border-color: var(--diff-color, var(--accent-border, rgba(125, 78, 87, 0.5)));
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35), 0 0 0 1px var(--accent-soft);
    }

    .problem-card:hover::before {
      opacity: 1;
      top: 5%;
      bottom: 5%;
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.5rem;
    }

    .problem-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-dimmer);
      letter-spacing: 0.06em;
    }

    .diff-badge {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.22rem 0.6rem;
      border-radius: 999px;
      flex-shrink: 0;
    }

    .diff-badge.fast {
      background: rgba(61, 220, 132, 0.14);
      color: var(--green);
      border: 1px solid rgba(61, 220, 132, 0.3);
    }

    .diff-badge.easy {
      background: rgba(61, 220, 132, 0.14);
      color: var(--green);
      border: 1px solid rgba(61, 220, 132, 0.3);
    }

    .diff-badge.medium {
      background: rgba(251, 191, 36, 0.14);
      color: var(--yellow);
      border: 1px solid rgba(251, 191, 36, 0.3);
    }

    .diff-badge.hard {
      background: rgba(248, 113, 113, 0.14);
      color: var(--red);
      border: 1px solid rgba(248, 113, 113, 0.3);
    }

    .problem-title {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text-main);
      letter-spacing: -0.01em;
      line-height: 1.3;
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 0.9rem;
      margin-top: auto;
    }

    .meta-item {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.72rem;
      color: var(--text-dimmer);
      font-weight: 500;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-dot.completed {
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
    }

    .status-dot.in-progress {
      background: var(--yellow);
      box-shadow: 0 0 6px var(--yellow);
    }

    .status-dot.new {
      background: var(--text-dimmer);
    }

    /* Diff colors for hover border */
    .problem-card.fast,
    .problem-card.easy {
      --diff-color: rgba(61, 220, 132, 0.55);
    }

    .problem-card.medium {
      --diff-color: rgba(251, 191, 36, 0.55);
    }

    .problem-card.hard {
      --diff-color: rgba(248, 113, 113, 0.55);
    }

    /* ─── Empty / error states ─── */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 5rem 2rem;
      color: var(--text-dim);
    }

    .empty-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    .empty-title {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 0.4rem;
      color: var(--text-main);
    }

    .empty-desc {
      font-size: 0.82rem;
    }

    /* ─── Responsive ─── */
    @media (max-width: 600px) {
      main {
        padding: 1.25rem 1rem 3rem;
      }

      .toolbar {
        flex-direction: column;
        align-items: stretch;
      }

      .search-wrap {
        max-width: none;
      }

      .filter-pills {
        margin-left: 0;
      }

      .nav {
        padding: 0.75rem 1rem;
      }

      .nav-tag {
        display: none;
      }
    }
  </style>
</head>

<body>

  <!-- Nav -->
  <nav class="nav">
    <a class="nav-brand" href="/mainmenu.html">
      <span class="nav-logo">CODUEL</span>
      <span class="nav-tag">Dashboard</span>
    </a>
    <div class="nav-actions">
      <a class="nav-btn nav-btn-ghost" href="/problem-add">+ New Problem</a>
    </div>
  </nav>

  <main>
    <!-- Stats -->
    <section class="stats-grid">
      <div class="stat-card total">
        <div class="stat-icon">📚</div>
        <div class="stat-label">Total Problems</div>
        <div class="stat-value" id="stat-total">—</div>
      </div>
      <div class="stat-card done">
        <div class="stat-icon">✅</div>
        <div class="stat-label">Completed</div>
        <div class="stat-value" id="stat-completed">—</div>
      </div>
      <div class="stat-card wip">
        <div class="stat-icon">⚡</div>
        <div class="stat-label">In Progress</div>
        <div class="stat-value" id="stat-progress">—</div>
      </div>
      <div class="stat-card fresh">
        <div class="stat-icon">🆕</div>
        <div class="stat-label">Not Started</div>
        <div class="stat-value" id="stat-new">—</div>
      </div>
    </section>

    <!-- Toolbar -->
    <div class="toolbar">
      <span class="section-title">Problems</span>

      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="search-input" type="text" placeholder="Search problems…" autocomplete="off" />
      </div>

      <div class="filter-pills">
        <button class="filter-pill active" data-filter="all">All</button>
        <button class="filter-pill" data-filter="fast">Fast</button>
        <button class="filter-pill" data-filter="easy">Easy</button>
        <button class="filter-pill" data-filter="medium">Medium</button>
        <button class="filter-pill" data-filter="hard">Hard</button>
      </div>
    </div>

    <!-- Problems grid -->
    <div class="problems-grid" id="problems-grid">
      <!-- Skeleton -->
      <div class="skeleton-card">
        <div class="sk-line short"></div>
        <div class="sk-line long"></div>
        <div class="sk-line thin"></div>
      </div>
      <div class="skeleton-card">
        <div class="sk-line short"></div>
        <div class="sk-line long"></div>
        <div class="sk-line thin"></div>
      </div>
      <div class="skeleton-card">
        <div class="sk-line short"></div>
        <div class="sk-line long"></div>
        <div class="sk-line thin"></div>
      </div>
      <div class="skeleton-card">
        <div class="sk-line short"></div>
        <div class="sk-line long"></div>
        <div class="sk-line thin"></div>
      </div>
    </div>
  </main>

  <script>
    const STATUS_KEY = 'oj-problem-status';
    let allProblems = [];
    let currentFilter = 'all';
    let searchQuery = '';

    function loadStatuses() {
      try { return JSON.parse(localStorage.getItem(STATUS_KEY) || '{}'); }
      catch { return {}; }
    }

    function getStatus(pid) { return loadStatuses()[pid] || 'new'; }

    // Animated counter
    function animateCount(el, target) {
      const duration = 700;
      const start = performance.now();
      const from = 0;
      function step(now) {
        const t = Math.min((now - start) / duration, 1);
        const ease = 1 - Math.pow(1 - t, 3);
        el.textContent = Math.round(from + (target - from) * ease);
        if (t < 1) requestAnimationFrame(step);
      }
      requestAnimationFrame(step);
    }

    function updateStats(problems) {
      const statuses = loadStatuses();
      let completed = 0, inProgress = 0, fresh = 0;
      problems.forEach(p => {
        const s = statuses[p.problem_id] || 'new';
        if (s === 'completed') completed++;
        else if (s === 'in-progress') inProgress++;
        else fresh++;
      });
      animateCount(document.getElementById('stat-total'), problems.length);
      animateCount(document.getElementById('stat-completed'), completed);
      animateCount(document.getElementById('stat-progress'), inProgress);
      animateCount(document.getElementById('stat-new'), fresh);
    }

    function renderProblems(problems) {
      const grid = document.getElementById('problems-grid');

      if (problems.length === 0) {
        grid.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">🔍</div>
            <div class="empty-title">No problems found</div>
            <div class="empty-desc">Try a different filter or search query.</div>
          </div>`;
        return;
      }

      grid.innerHTML = '';
      const statuses = loadStatuses();

      problems.forEach((p, i) => {
        const status = statuses[p.problem_id] || 'new';
        const diff = (p.difficulty || 'unknown').toLowerCase();
        const numStr = typeof p.number === 'number' ? String(p.number).padStart(3, '0') : '—';
        const title = escapeHtml(p.title || p.problem_id);
        const tests = p.tests || 0;

        const card = document.createElement('a');
        card.className = `problem-card ${diff}`;
        card.href = `/workspace.html?pid=${encodeURIComponent(p.problem_id)}`;
        card.style.animationDelay = `${i * 35}ms`;
        card.innerHTML = `
          <div class="card-top">
            <span class="problem-num">#${numStr}</span>
            <span class="diff-badge ${diff}">${diff}</span>
          </div>
          <div class="problem-title">${title}</div>
          <div class="card-meta">
            <span class="meta-item">
              <span class="status-dot ${status}"></span>
              ${status === 'completed' ? 'Solved' : status === 'in-progress' ? 'In Progress' : 'New'}
            </span>
            <span class="meta-item">📋 ${tests} test${tests !== 1 ? 's' : ''}</span>
          </div>`;
        grid.appendChild(card);
      });
    }

    function getFiltered() {
      return allProblems.filter(p => {
        const matchFilter = currentFilter === 'all' || p.difficulty === currentFilter;
        const matchSearch = !searchQuery || (p.title || '').toLowerCase().includes(searchQuery) ||
          (p.problem_id || '').toLowerCase().includes(searchQuery);
        return matchFilter && matchSearch;
      });
    }

    function applyFilter(filter) {
      currentFilter = filter;
      document.querySelectorAll('.filter-pill').forEach(btn => {
        const f = btn.dataset.filter;
        btn.classList.remove('active', 'active-fast', 'active-easy', 'active-medium', 'active-hard');
        if (f === filter) {
          if (filter === 'all') btn.classList.add('active');
          else btn.classList.add(`active-${filter}`);
        }
      });
      renderProblems(getFiltered());
    }

    async function loadProblems() {
      try {
        const res = await fetch('/api/problems');
        if (!res.ok) throw new Error(res.statusText);
        const data = await res.json();
        allProblems = Array.isArray(data.problems) ? data.problems : [];
        updateStats(allProblems);
        renderProblems(getFiltered());
      } catch (err) {
        document.getElementById('problems-grid').innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">⚠️</div>
            <div class="empty-title">Failed to load problems</div>
            <div class="empty-desc">${escapeHtml(String(err.message))}</div>
          </div>`;
      }
    }

    function escapeHtml(t) {
      return String(t)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    document.querySelectorAll('.filter-pill').forEach(btn => {
      btn.addEventListener('click', () => applyFilter(btn.dataset.filter));
    });

    document.getElementById('search-input').addEventListener('input', e => {
      searchQuery = e.target.value.trim().toLowerCase();
      renderProblems(getFiltered());
    });

    // Redirect if in room context
    const roomCode = new URLSearchParams(location.search).get('room');
    if (roomCode) window.location.href = '/workspace.html?room=' + roomCode;

    loadProblems();
  </script>
  <script src="theme.js"></script>
</body>

</html>
